services:

  # ---------------------------------------------------------------------------
  # logbook_service — Django ASGI (HTTP + WebSocket)
  # ---------------------------------------------------------------------------
  logbook-api:
    build: ./logbook_service
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://${LOGBOOK_DB_USER}:${LOGBOOK_DB_PASSWORD}@logbook-db:5432/${LOGBOOK_DB_NAME}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./logbook_service:/app
    depends_on:
      logbook-db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  logbook-worker:
    build: ./logbook_service
    command: celery -A config worker -l info -Q logbook,export,ai --concurrency=4
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://${LOGBOOK_DB_USER}:${LOGBOOK_DB_PASSWORD}@logbook-db:5432/${LOGBOOK_DB_NAME}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logbook_service:/app
    depends_on:
      logbook-db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  logbook-beat:
    build: ./logbook_service
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://${LOGBOOK_DB_USER}:${LOGBOOK_DB_PASSWORD}@logbook-db:5432/${LOGBOOK_DB_NAME}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logbook_service:/app
    depends_on:
      logbook-db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # subscription_service — Django WSGI
  # ---------------------------------------------------------------------------
  sub-api:
    build: ./subscription_service
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://${SUB_DB_USER}:${SUB_DB_PASSWORD}@sub-db:5432/${SUB_DB_NAME}
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8001:8001"
    volumes:
      - ./subscription_service:/app
    depends_on:
      sub-db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  sub-worker:
    build: ./subscription_service
    command: celery -A config worker -l info -Q subscription --concurrency=2
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://${SUB_DB_USER}:${SUB_DB_PASSWORD}@sub-db:5432/${SUB_DB_NAME}
      REDIS_URL: redis://redis:6379/1
    volumes:
      - ./subscription_service:/app
    depends_on:
      sub-db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Databases
  # ---------------------------------------------------------------------------
  logbook-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${LOGBOOK_DB_NAME}
      POSTGRES_USER: ${LOGBOOK_DB_USER}
      POSTGRES_PASSWORD: ${LOGBOOK_DB_PASSWORD}
    volumes:
      - logbook_db_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOGBOOK_DB_USER} -d ${LOGBOOK_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sub-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${SUB_DB_NAME}
      POSTGRES_USER: ${SUB_DB_USER}
      POSTGRES_PASSWORD: ${SUB_DB_PASSWORD}
    volumes:
      - sub_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUB_DB_USER} -d ${SUB_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis (shared broker + Channels layer)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object store for uploads & PDF exports)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx (reverse proxy)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - logbook-api
      - sub-api
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Flower (Celery task monitor)
  # ---------------------------------------------------------------------------
  flower:
    image: mher/flower:2.0
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  logbook_db_data:
  sub_db_data:
  redis_data:
  minio_data:
